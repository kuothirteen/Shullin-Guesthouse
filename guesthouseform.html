<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水林最美民宿 | 專業訂房系統</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        html {
            background-color: #34495e !important;
            height: 100%;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(180deg, #34495e 0%, #2c3e50 100%) fixed !important;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 95%;
            max-width: 750px;
            background-color: #ffffff;
            padding: 25px;
            margin: 40px 0;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h2 {
            color: #FF385C;
            margin-bottom: 5px;
            font-weight: 700;
            font-size: 28px;
        }

        .subtitle {
            color: #717171;
            margin-bottom: 30px;
            font-size: 16px;
        }

        /* 第一步：房態日曆區 */
        .section-title {
            font-size: 18px;
            color: #333;
            font-weight: bold;
            margin: 20px 0 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .section-title::before {
            content: '📅';
            margin-right: 10px;
        }

        .calendar-section {
            background-color: #fff9fa;
            padding: 10px;
            border-radius: 15px;
            margin-bottom: 30px;
            border: 2px dashed #FF385C;
        }

        .calendar-wrapper {
            position: relative;
            padding-bottom: 75%;
            height: 0;
            overflow: hidden;
            border-radius: 10px;
        }

        .calendar-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 第二步：訂房表單區 */
        .form-title::before {
            content: '📝';
            margin-right: 10px;
        }

        .form-wrapper {
            position: relative;
            width: 100%;
            height: 850px;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #eee;
            background-color: #fafafa;
        }

        .form-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .footer {
            padding: 40px;
            color: #bdc3c7;
            font-size: 13px;
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>水林最美民宿預約</h2>
        <p class="subtitle">🏠 一天僅限一組，預約您的專屬時光</p>

        <div class="calendar-section">
            <div class="section-title">第一步：查看空房日期</div>
            <p style="font-size: 13px; color: #FF385C; margin-bottom: 10px;">( 日曆上標示「已滿」之日期無法受理預約 )</p>
            <div class="calendar-wrapper">
                <iframe src="https://calendar.google.com/calendar/embed?src=kuo.thirteen%40gmail.com&ctz=Asia%2FTaipei"
                    style="border: 0" width="800" height="600" frameborder="0" scrolling="no"></iframe>></iframe>
            </div>
        </div>

        <div class="section-title form-title">第二步：填寫預約單</div>
        <div class="form-wrapper">
            <iframe
                src="https://docs.google.com/forms/d/e/1FAIpQLScc_2YcFl2x6gIOoyc-R0-YrQ-ebJcel95KOxzh84vjmI--9g/viewform?embedded=true">
                載入中…
            </iframe>
        </div>
    </div>

    <footer class="footer">
        <p>© 2026 水林最美民宿 版權所有 · 隱私 · 條款</p>
    </footer>

</body>

</html>
